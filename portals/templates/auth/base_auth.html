<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>AMEE | Plateforme</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
          rel="stylesheet" />
</head>

<body class="min-h-screen bg-base-200">

<div class="min-h-screen flex">
        <!-- FLASH MESSAGES -->

    <!-- COLONNE GAUCHE -->
    <div class="hidden lg:flex w-1/2  bg-[#1E3A8A] text-white flex-col justify-center items-center p-16">

        <div class="text-center">
            <div class="text-5xl font-bold mb-6">
                AMEE
            </div>

            <p class="opacity-80 leading-relaxed max-w-md">
                Association Malienne pour l'Évaluation Environnementale.
                Plateforme officielle de gestion des membres,
                entreprises partenaires et roster d’experts.
            </p>

            <a href="https://amee-web-site.web.app/"
               target="_blank"
               class="btn btn-outline btn-white mt-8">
                Visiter le site officiel
            </a>
        </div>

    </div>

    <!-- COLONNE DROITE -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-10">

        <div class="w-full max-w-md">

            <!-- Logo Mobile -->
            <div class="lg:hidden text-center mb-8">
                <div class="text-3xl font-bold text-primary">
                    AMEE
                </div>
                <a href="https://amee-web-site.web.app/"
                   target="_blank"
                   class="text-sm text-primary underline">
                    Site officiel
                </a>
            </div>

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

</body>
</html>

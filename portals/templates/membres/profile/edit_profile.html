{% extends "base_espace.html" %}

{% block content %}

<div class="max-w-3xl mx-auto p-6 space-y-6">

<h1 class="text-2xl font-bold">Modifier mon profil</h1>

<form method="post"
      enctype="multipart/form-data"
      class="card bg-base-100 shadow border border-base-300">

{% csrf_token %}

<div class="card-body space-y-6">

<h2 class="card-title">Informations personnelles</h2>

<!-- ================= PHOTO ================= -->
<!-- ================= PHOTO ================= -->
<div class="flex items-center gap-6">

<div class="relative">

    <img
        id="photoPreview"
        src="{% if user.photo %}{{ user.photo.url }}{% else %}/static/img/avatar-placeholder.png{% endif %}"
        class="w-24 h-24 rounded-full object-cover border shadow-sm"
    >

</div>

<div class="flex-1">

<label class="form-control">
<span class="label-text font-medium">Photo de profil</span>

{{ form.photo }}

{% if form.photo.help_text %}
<p class="text-xs opacity-60 mt-1">
{{ form.photo.help_text }}
</p>
{% endif %}

</label>

</div>

</div>

<!-- ================= NOM ================= -->
<div class="grid md:grid-cols-2 gap-4">

    <label class="form-control">
        <span class="label-text">Prénom</span>
        {{ form.first_name }}
    </label>

    <label class="form-control">
        <span class="label-text">Nom</span>
        {{ form.last_name }}
    </label>

</div>
<div class="grid md:grid-cols-2 gap-4">

    <label class="form-control">
        <span class="label-text">Nationalite</span>
        {{ form.nationalite }}
    </label>

    <label class="form-control">
        <span class="label-text">Pays de residence</span>
        {{ form.pays_residence }}
    </label>

</div>
<!-- ================= TELEPHONES ================= -->


<div class="grid md:grid-cols-2 gap-4">

<label class="form-control">

<span class="label-text">Téléphone officiel</span>

{{ form.phone }}

{% if form.phone.errors %}
<span class="text-error text-xs mt-1">
{{ form.phone.errors|striptags }}
</span>
{% endif %}

</label>

<label class="form-control">
    <span class="label-text">Téléphone secondaire</span>
    {{ form.secondary_phone }}
    {% if form.secondary_phone.errors %}
<span class="text-error text-xs mt-1">
{{ form.secondary_phone.errors|striptags }}
</span>
{% endif %}
</label>

</div>

<!-- ================= ACTIONS ================= -->

<div class="flex justify-between items-center pt-4">

    <a href="{% url 'member_profile' %}"
       class="btn btn-ghost">
        Annuler
    </a>

    <button type="submit" class="btn btn-primary">
        Enregistrer les modifications
    </button>

</div>

</div>
</form>

</div>

<script>

const input = document.getElementById("photoInput");
const preview = document.getElementById("photoPreview");

if (input) {

input.addEventListener("change", function(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){
preview.src = e.target.result;
};

reader.readAsDataURL(file);

});

}

</script>

{% endblock %}
